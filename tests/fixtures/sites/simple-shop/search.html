<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Search Products - Simple Shop</title>
    <link rel="canonical" href="https://fixture.local/search.html">
  </head>
  <body>
    <header>
      <a href="/">Home</a>
      <a href="/products.html">Products</a>
    </header>
    <main>
      <h1>Search products</h1>
      <form id="product-search" role="search" method="GET" action="/search.html">
        <label for="q">Search products</label>
        <input id="q" name="q" type="search" placeholder="wireless headphones">
        <select name="category">
          <option value="">All categories</option>
          <option value="audio">Audio</option>
        </select>
        <button type="submit">Search</button>
      </form>
      <a href="/product-1.html">Wireless headphones result</a>
    </main>
  </body>
